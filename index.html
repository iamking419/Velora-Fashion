<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="VELORA — Luxury Fashion. Where heritage craftsmanship meets contemporary vision.">
  <title>VELORA | Luxury Fashion</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='8' fill='%230a0a0a'/%3E%3Ctext x='50' y='68' font-family='serif' font-size='60' fill='%23C9A96E' text-anchor='middle' font-weight='300'%3EV%3C/text%3E%3C/svg%3E">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='24' fill='%230a0a0a'/%3E%3Ctext x='90' y='125' font-family='serif' font-size='110' fill='%23C9A96E' text-anchor='middle' font-weight='300'%3EV%3C/text%3E%3C/svg%3E">

  <!-- Preconnect to Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    /* Critical CSS for instant render */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }
    body { 
      background: #0a0a0a; 
      color: #f5f0eb; 
      font-family: 'Inter', sans-serif; 
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    #root { min-height: 100vh; }

    /* Loading spinner while React loads */
    .initial-loader {
      position: fixed; inset: 0; background: #0a0a0a; z-index: 99999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 0.6s ease;
    }
    .initial-loader.hidden { opacity: 0; pointer-events: none; }
    .initial-loader .v-logo {
      width: 72px; height: 72px; border: 1px solid #C9A96E;
      display: flex; align-items: center; justify-content: center; margin-bottom: 24px;
    }
    .initial-loader .v-logo span {
      font-family: 'Cormorant Garamond', serif; font-size: 36px; color: #C9A96E; font-weight: 300;
    }
    .initial-loader p {
      font-family: 'Cormorant Garamond', serif; font-size: 20px; letter-spacing: 6px; color: #f5f0eb; font-weight: 300;
    }
  </style>
<base target="_blank">
</head>
<body>
  <div id="root">
    <!-- Initial loader shown before React hydrates -->
    <div class="initial-loader" id="initial-loader">
      <div class="v-logo"><span>V</span></div>
      <p>VELORA</p>
    </div>
  </div>

  <script>
    // Hide initial loader once React is ready
    window.addEventListener('load', function() {
      setTimeout(function() {
        var loader = document.getElementById('initial-loader');
        if (loader) { loader.classList.add('hidden'); }
      }, 500);
    });
  </script>
</body>
</html>
